name: CI/CD Back Despachos to EKS

on:
  push:
    branches:
      - deploy

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t back-despachos ./back-despachos

      - name: Tag Docker image
        run: |
          docker tag back-despachos:latest ${{ secrets.ECR_REGISTRY }}/back-despachos:latest

      - name: Push Docker image
        run: |
          docker push ${{ secrets.ECR_REGISTRY }}/back-despachos:latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Restart deployment
        run: |
          kubectl rollout restart deployment back-despachos